<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Cup 2026 Pool</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>⚽ World Cup 2026 Pool</h1>
    <div id="mode-bar">
      <span id="mode-label">Viewer mode</span>
      <button id="admin-toggle-btn">Admin</button>
    </div>
  </header>

  <!-- Admin password prompt -->
  <div id="admin-login" class="modal hidden">
    <div class="modal-box">
      <h2>Admin access</h2>
      <input type="password" id="admin-password" placeholder="Password" />
      <div class="modal-actions">
        <button id="admin-login-cancel">Cancel</button>
        <button id="admin-login-submit" class="primary">Enter</button>
      </div>
      <p id="admin-login-error" class="error hidden">Wrong password</p>
    </div>
  </div>

  <main>
    <!-- ── ADMIN PANEL ─────────────────────────────────────────── -->
    <section id="admin-panel" class="hidden">
      <h2>Admin Panel</h2>

      <!-- Participants -->
      <div class="card">
        <h3>Participants</h3>
        <div id="participants-list"></div>
        <div class="row">
          <input type="text" id="new-participant-name" placeholder="Name" />
          <label class="checkbox-label">
            <input type="checkbox" id="new-participant-extra" />
            5-team group
          </label>
          <button id="add-participant-btn" class="primary">Add</button>
        </div>
        <p class="hint">Up to 10 participants. Mark someone for the 5-team group (5 people get 5 teams, 5 get 4).</p>
      </div>

      <!-- Allocation controls -->
      <div class="card">
        <h3>Allocation</h3>
        <button id="allocate-btn" class="primary big">🎲 Randomize &amp; Allocate</button>
        <button id="clear-allocation-btn" class="danger">Clear allocation</button>
        <p id="allocation-status" class="hint"></p>
      </div>

      <!-- Pool title/date -->
      <div class="card">
        <h3>Pool settings</h3>
        <label>Pool title
          <input type="text" id="pool-title-input" placeholder="e.g. Family Pool 2026" />
        </label>
        <label>Password (to access admin)
          <input type="password" id="pool-password-input" placeholder="Set admin password" />
        </label>
        <button id="save-settings-btn" class="primary">Save settings</button>
      </div>
    </section>

    <!-- ── RESULTS VIEW (admin + viewer) ──────────────────────── -->
    <section id="results-section">
      <div id="pool-title-display"></div>
      <div id="allocation-grid"></div>
      <div id="no-allocation-msg" class="hint center">No allocation yet. Admin can generate one.</div>
    </section>

    <!-- ── EXPORT ──────────────────────────────────────────────── -->
    <section id="export-section" class="hidden">
      <div class="card">
        <h3>Export for WhatsApp</h3>
        <textarea id="export-text" rows="20" readonly></textarea>
        <button id="copy-btn" class="primary">📋 Copy to clipboard</button>
        <p id="copy-feedback" class="hint hidden">Copied!</p>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
